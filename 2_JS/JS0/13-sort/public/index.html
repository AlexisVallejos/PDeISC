<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS0 - sort() Masterclass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <header class="header">
        <h1>Método <span>sort()</span></h1>
        <p>Ordena los elementos de un array localmente y devuelve el array.</p>
    </header>

    <main class="container">

        <!-- Ejercicio 1 -->
        <section class="card">
            <div class="card-header">
                <h2>1. Ordenar Números</h2>
                <p>Ordena de menor a mayor.</p>
            </div>
            <div class="card-body">
                <div class="array-display" id="display-1">Haz clic para ejecutar</div>
                <div class="controls">
                    <input id="input-1" type="text" placeholder="Ingresá datos separados por coma">
                    <button id="btn-1" class="btn primary">Ejecutar Código</button>
                </div>
            </div>
        </section>

        <!-- Ejercicio 2 -->
        <section class="card">
            <div class="card-header">
                <h2>2. Alfabeto</h2>
                <p>Ordena palabras alfabéticamente.</p>
            </div>
            <div class="card-body">
                <div class="array-display" id="display-2">Haz clic para ejecutar</div>
                <div class="controls">
                    <input id="input-2" type="text" placeholder="Ingresá datos separados por coma">
                    <button id="btn-2" class="btn secondary">Ejecutar Código</button>
                </div>
            </div>
        </section>

        <!-- Ejercicio 3 -->
        <section class="card">
            <div class="card-header">
                <h2>3. Por Edad</h2>
                <p>Ordena objetos por edad.</p>
            </div>
            <div class="card-body">
                <div class="array-display" id="display-3">Haz clic para ejecutar</div>
                <div class="controls">
                    <input id="input-3" type="text" placeholder="Ingresá datos separados por coma">
                    <button id="btn-3" class="btn accent">Ejecutar Código</button>
                </div>
            </div>
        </section>

    </main>
    <script src="js/sort.js"></script>
</body>
</html>
