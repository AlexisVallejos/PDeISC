<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launcher JS0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles/light.css">
  <link rel="stylesheet" href="/styles/dark.css">
  <style>
    :root {
      --surface: rgba(255, 255, 255, 0.7);
      --border-soft: rgba(255, 255, 255, 0.4);
      --muted-soft: color-mix(in srgb, var(--muted) 90%, transparent);
    }
    [data-theme="dark"] {
      --surface: rgba(17, 24, 39, 0.7);
      --border-soft: rgba(255, 255, 255, 0.05);
    }
    body {
      font-family: "Plus Jakarta Sans", sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.15), transparent 25%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .launcher-shell { max-width: 1400px; margin-inline: auto; position: relative; z-index: 10; }
    .hero { max-width: 800px; margin: 0 auto 4rem; text-align: center; }
    .hero h1 { font-weight: 800; line-height: 1.1; font-size: clamp(2.5rem, 5vw, 4rem); letter-spacing: -0.02em; margin-bottom: 1rem; }
    .hero p { color: var(--muted-soft); font-size: 1.1rem; line-height: 1.6; }
    .launcher-card {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .launcher-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.12);
    }
    .method-pill {
      display: inline-flex;
      align-items: center;
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      border-radius: 8px;
      font-size: 0.85rem;
      padding: 4px 12px;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    .open-btn {
      min-height: 48px;
      border-radius: 12px;
      font-weight: 700;
      background: var(--accent);
      border: 0;
      color: #fff;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: auto;
    }
    .open-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.02);
    }
    .fab-left, .fab-right {
      position: fixed;
      bottom: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid var(--border-soft);
      background: var(--surface);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      z-index: 60;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .fab-left:hover, .fab-right:hover {
      transform: scale(1.1);
    }
    .fab-left { left: 24px; }
    .fab-right { right: 24px; display: none; }
    .fab-left svg, .fab-right svg { width: 24px; height: 24px; fill: currentColor; }
    
    /* Background animated blobs */
    .blob {
      position: fixed;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.5;
      animation: float 20s infinite alternate;
    }
    .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: var(--accent); border-radius: 50%; }
    .blob-2 { bottom: -10%; right: -10%; width: 600px; height: 600px; background: #0ea5e9; border-radius: 50%; animation-delay: -10s; }
    
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <main class="container-fluid px-4 py-5 launcher-shell">
    <header class="hero">
      <span class="method-pill" style="margin-bottom: 1rem; background: var(--border); color: var(--text)">Node.js & Vanilla JS</span>
      <h1>Mastering JS Arrays</h1>
      <p>Entorno interactivo para dominar los métodos de arreglos en JavaScript. Cada módulo corre de forma aislada en su propio servidor de Node.js.</p>
    </header>

    <section id="grid" class="row g-4"></section>
  </main>

  <button id="themeBtn" class="fab-left" type="button" aria-label="Cambiar tema">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a1 1 0 0 1 1 1v1.1a1 1 0 1 1-2 0V4a1 1 0 0 1 1-1Zm0 14a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm9-6a1 1 0 0 1-1 1h-1.1a1 1 0 1 1 0-2H20a1 1 0 0 1 1 1ZM6.2 6.2a1 1 0 0 1 0 1.4l-.8.8a1 1 0 1 1-1.4-1.4l.8-.8a1 1 0 0 1 1.4 0Zm12.2 0a1 1 0 0 1 1.4 0l.8.8a1 1 0 1 1-1.4 1.4l-.8-.8a1 1 0 0 1 0-1.4ZM4 11a1 1 0 1 1 0 2H2.9a1 1 0 1 1 0-2H4Zm1.4 6.2a1 1 0 0 1 1.4 1.4l-.8.8a1 1 0 0 1-1.4-1.4l.8-.8Zm13.2 0 .8.8a1 1 0 0 1-1.4 1.4l-.8-.8a1 1 0 0 1 1.4-1.4ZM12 18.9a1 1 0 0 1 1 1V21a1 1 0 1 1-2 0v-1.1a1 1 0 0 1 1-1Z"/></svg>
  </button>
  <button id="toTop" class="fab-right" type="button" aria-label="Subir arriba">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5.3 4.6 12.7a1 1 0 0 0 1.4 1.4l5-5V20a1 1 0 1 0 2 0V9.1l5 5a1 1 0 0 0 1.4-1.4L12 5.3Z"/></svg>
  </button>

  <script type="module" src="/scripts/main.js"></script>
</body>
</html>
