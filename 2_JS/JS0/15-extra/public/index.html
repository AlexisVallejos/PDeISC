<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 15 Extra - Mensajes secretos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>15-extra</h1>
        <p class="description">Pega un mensaje codificado y decodificalo.</p>

        <div class="controls" id="controls">
            <textarea id="input-mensaje" rows="5" maxlength="500" placeholder="Mensaje codificado"></textarea>
            <button id="btn-decodificar">Decodificar</button>
            <button id="btn-ejemplo">Cargar ejemplo</button>
            <button id="btn-limpiar">Limpiar</button>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <div class="array-container result-container" id="array-container">
            <div class="array-item message-item">Esperando mensaje...</div>
        </div>

        <div class="console-output" id="console-output">
            El resultado aparecera aca.
        </div>
    </div>

    <script src="js/secreto.js"></script>
</body>
</html>
