<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto 1 - DOM basico</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <main class="page">
    <section class="layout">
      <section class="panel control-panel">
        <p class="eyebrow">Proyecto 1</p>
        <h1>Laboratorio DOM</h1>
        <p class="helper">Usa estos botones para crear y modificar elementos del documento.</p>
        <div class="action-list">
          <button id="btnAddTitle" type="button" data-icon="+">Agregar H1</button>
          <button id="btnChangeText" type="button" data-icon="TXT">Cambiar texto</button>
          <button id="btnChangeColor" type="button" data-icon="CLR">Cambiar color</button>
          <button id="btnAddImage" type="button" data-icon="IMG">Agregar imagen</button>
          <button id="btnChangeImage" type="button" data-icon="SRC">Cambiar imagen</button>
          <button id="btnResizeImage" type="button" data-icon="PX">Cambiar tamano</button>
        </div>
      </section>

      <section class="panel result" aria-live="polite">
        <div id="domArea" class="dom-area">
          <p class="empty-state">Area de trabajo</p>
        </div>
        <p id="message" class="message">Sin cambios todavia.</p>
      </section>
    </section>
  </main>

  <script src="./js/script.js"></script>
</body>
</html>
