<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto 1 - DOM basico</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <main class="page">
    <section class="layout">
      <section class="panel console-panel">
        <p class="eyebrow">Proyecto 1</p>
        <h1>Practica de eventos DHTML</h1>
        <p class="helper">
          Usa los botones para agregar y modificar el <code>H1</code> y la imagen dentro del area de trabajo.
        </p>
        <div class="action-list">
          <button id="addTitleButton" type="button" data-icon="H1">Agregar H1</button>
          <button id="changeTitleTextButton" type="button" data-icon="TXT">Cambiar texto</button>
          <button id="changeTitleColorButton" type="button" data-icon="CLR">Cambiar color</button>
          <button id="addImageButton" type="button" data-icon="IMG">Agregar imagen</button>
          <button id="changeImageButton" type="button" data-icon="SWP">Cambiar imagen</button>
          <button id="resizeImageButton" type="button" data-icon="SZ">Cambiar tamano</button>
        </div>
      </section>

      <section class="panel result" aria-live="polite">
        <div id="domArea" class="dom-area">
          <p class="empty-state">Area de practica</p>
        </div>
        <p id="message" class="message">Selecciona una accion para comenzar la practica.</p>
      </section>
    </section>
  </main>

  <script src="./js/script.js"></script>
</body>
</html>
